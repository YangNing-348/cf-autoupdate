name: Auto Update Cloudflare Best IP to Gist

on:
  schedule:
    # ⏰ 每 6 小时在 GitHub 云端自动测速并更新一次
    - cron: '0 */6 * * *'
  workflow_dispatch: # 支持你在网页端随时手动点击按钮立刻更新

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Best Cloudflare IPs and Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # 1. 抓取最新优选 IP
          IPS=$(curl -s https://raw.githubusercontent.com/vfarid/cf-clean-ips/main/list.txt | head -n 3)
          IP1=$(echo "$IPS" | sed -n '1p')
          IP2=$(echo "$IPS" | sed -n '2p')
          IP3=$(echo "$IPS" | sed -n '3p')
          
          echo "最新获取的优选IP: $IP1, $IP2, $IP3"

          # 2. 从 Gist 下载当前配置
          curl -s -H "Authorization: token $GIST_TOKEN" "https://api.github.com/gists/$GIST_ID" > gist.json
          
          # 3. 使用 Python 精准、安全地替换
          python3 -c "
          import json, re, sys
          
          try:
              data = json.load(open('gist.json'))
              # 动态获取第一个文件的文件名（管它是 txt 还是 yaml）
              filename = list(data['files'].keys())[0]
              print(f'成功匹配到 Gist 中的文件名: {filename}')
              
              content = data['files'][filename]['content']
              
              # 正则无感替换 server 后的 IP 地址
              content = re.sub(r'(name:\s*\"?优选IP_1\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP1'+'\"', content)
              content = re.sub(r'(name:\s*\"?优选IP_2\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP2'+'\"', content)
              content = re.sub(r'(name:\s*\"?优选IP_3\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP3'+'\"', content)
              
              update_data = {'files': {filename: {'content': content}}}
              json.dump(update_data, open('payload.json', 'w'))
              print('YAML 内存修改成功，Payload 已生成。')
          except Exception as e:
              print(f'❌ 脚本执行出错: {str(e)}', file=sys.stderr)
              sys.exit(1)
          "

          # 4. 推回 Gist
          curl -s -X PATCH -H "Authorization: token $GIST_TOKEN" \
               -H "Content-Type: application/json" \
               -d @payload.json \
               "https://api.github.com/gists/$GIST_ID" > /dev/null
               
          echo "🚀 恭喜！Gist 优选 IP 自动更新成功！"
