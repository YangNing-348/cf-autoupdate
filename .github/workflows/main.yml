name: Auto Update Cloudflare Best IP to Gist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Best Cloudflare IPs and Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # 🎯 换用去重且专门针对国内网络优化的移动/联通/电信混合优质源
          # 利用 awk '!seen[$0]++' 实现绝对去重，确保 3 个 IP 各不相同
          RAW_IPS=$(curl -s https://raw.githubusercontent.com/ymyuuu/Cloudflare-SpeedTest-IP/main/bestip.txt)
          IPS=$(echo "$RAW_IPS" | grep -E -o '([0-9]{1,3}\.){3}[0-9]{1,3}' | awk '!seen[$0]++' | head -n 3)
          
          IP1=$(echo "$IPS" | sed -n '1p')
          IP2=$(echo "$IPS" | sed -n '2p')
          IP3=$(echo "$IPS" | sed -n '3p')
          
          echo "🔥 完美去重后的 3 个不同优选IP:"
          echo "IP1: $IP1"
          echo "IP2: $IP2"
          echo "IP3: $IP3"

          # 兜底防御：如果没拿到合法 IP，直接中断不破坏原配置文件
          if [ -z "$IP1" ] || [ -z "$IP2" ] || [ -z "$IP3" ]; then
              echo "❌ 错误：未能解析出 3 个不重复的合法 IPv4 地址！"
              exit 1
          fi

          # 2. 从 Gist 下载当前配置（以下逻辑保持不变）
          curl -s -H "Authorization: token $GIST_TOKEN" "https://api.github.com/gists/$GIST_ID" > gist.json
          
          # 3. 动态获取文件名
          FILENAME=$(python3 -c "import json; data=json.load(open('gist.json')); print(list(data['files'].keys())[0])")

          # 4. 使用 Python 实施无感安全替换
          python3 -c "
          import json, re, sys
          try:
              data = json.load(open('gist.json'))
              filename = '$FILENAME'
              content = data['files'][filename]['content']
              
              content = re.sub(r'(name:\s*\"?优选IP_1\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP1'+'\"', content)
              content = re.sub(r'(name:\s*\"?优选IP_2\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP2'+'\"', content)
              content = re.sub(r'(name:\s*\"?优选IP_3\"?.*?server:\s*)([^\s,\}]+)', r'\g<1>\"'+'$IP3'+'\"', content)
              
              update_data = {'files': {filename: {'content': content}}}
              json.dump(update_data, open('payload.json', 'w'))
          except Exception as e:
              print(f'❌ 脚本替换出错: {str(e)}', file=sys.stderr)
              sys.exit(1)
          "

          # 5. 安全 PATCH 推回 Gist
          curl -s -X PATCH -H "Authorization: token $GIST_TOKEN" \
               -H "Content-Type: application/json" \
               -d @payload.json \
               "https://api.github.com/gists/$GIST_ID" > /dev/null
               
          echo "🚀 恭喜！多源去重版自动更新成功！"
