name: Auto Update CF IP to Gist

on:
  schedule:
    # 每天北京时间凌晨 04:00 自动运行 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  run-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download CloudflareSpeedTest
        run: |
          # 下载官方 Linux 64位 版本的 Cloudflare 测速工具
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/cfst_linux_amd64.tar.gz
          tar -zxf cfst_linux_amd64.tar.gz cfst
          chmod +x cfst

      - name: Run CloudflareSpeedTest
        run: |
          # 运行测速，筛选出 3 个下载速度最快的 IP
          ./cfst -dn 3 -f ip.txt -o result.csv
          
          # 提取测速结果中的 3 个 IP
          IP_1=$(sed -n '2p' result.csv | cut -d',' -f1)
          IP_2=$(sed -n '3p' result.csv | cut -d',' -f1)
          IP_3=$(sed -n '4p' result.csv | cut -d',' -f1)
          
          echo "Selected IP 1: $IP_1"
          echo "Selected IP 2: $IP_2"
          echo "Selected IP 3: $IP_3"
          
          # 将 IP 写入环境变量
          echo "CF_IP_1=$IP_1" >> $GITHUB_ENV
          echo "CF_IP_2=$IP_2" >> $GITHUB_ENV
          echo "CF_IP_3=$IP_3" >> $GITHUB_ENV

      - name: Generate New YAML File
        run: |
          if [ ! -f "wmsxwd.yaml" ]; then
            echo "Error: wmsxwd.yaml not found in repository root!"
            exit 1
          fi

          # 精准替换 yaml 文件中对应优选 IP 的真实 server 字段
          sed -i -E '/name: "优选IP_1"/s/server: "[^"]+"/server: "'"${CF_IP_1}"'"/' wmsxwd.yaml
          sed -i -E '/name: "优选IP_2"/s/server: "[^"]+"/server: "'"${CF_IP_2}"'"/' wmsxwd.yaml
          sed -i -E '/name: "优选IP_3"/s/server: "[^"]+"/server: "'"${CF_IP_3}"'"/' wmsxwd.yaml

          echo "YAML file updated successfully with new IPs."

      - name: Update GitHub Gist via API
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # 使用 python 将本地修改后的 wmsxwd.yaml 内容进行 JSON 转义，防止由于特殊字符导致 API 请求失败
          CONTENT=$(python3 -c 'import json; print(json.dumps(open("wmsxwd.yaml").read()))')
          
          # 构造调用 GitHub 官方 API 的 JSON 数据体
          JSON_DATA="{\"files\": {\"wmsxwd.yaml\": {\"content\": $CONTENT}}}"
          
          # 使用 curl 直接更新 Gist
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/$GIST_ID \
            -d "$JSON_DATA"
          
          echo "Gist updated successfully via Official GitHub API."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wmsxwd.yaml
          git diff-index --quiet HEAD || git commit -m "chore: auto update cloudflare ips"
          git push
