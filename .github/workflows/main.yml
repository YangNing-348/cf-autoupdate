name: Auto Update CF IP to Gist

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  run-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download CloudflareSpeedTest and IP list
        run: |
          # 1. 下载并解压最新的测速主程序 cfst
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/cfst_linux_amd64.tar.gz
          tar -zxf cfst_linux_amd64.tar.gz cfst
          chmod +x cfst
          
          # 2. 💡 核心修复：直接从官方下载程序运行必须依赖的默认 ip.txt 文件
          wget -q https://raw.githubusercontent.com/XIU2/CloudflareSpeedTest/master/ip.txt

      - name: Run CloudflareSpeedTest
        run: |
          # 现在有 ip.txt 了，直接正常跑测速，筛选 3 个最快 IP
          ./cfst -dn 3 -o result.csv
          
          # 提取测速结果
          IP_1=$(sed -n '2p' result.csv | cut -d',' -f1)
          IP_2=$(sed -n '3p' result.csv | cut -d',' -f1)
          IP_3=$(sed -n '4p' result.csv | cut -d',' -f1)
          
          echo "CF_IP_1=$IP_1" >> $GITHUB_ENV
          echo "CF_IP_2=$IP_2" >> $GITHUB_ENV
          echo "CF_IP_3=$IP_3" >> $GITHUB_ENV

      - name: Generate New YAML File
        run: |
          if [ ! -f "wmsxwd.yaml" ]; then exit 1; fi
          sed -i -E '/name: "优选IP_1"/s/server: "[^"]+"/server: "'"${CF_IP_1}"'"/' wmsxwd.yaml
          sed -i -E '/name: "优选IP_2"/s/server: "[^"]+"/server: "'"${CF_IP_2}"'"/' wmsxwd.yaml
          sed -i -E '/name: "优选IP_3"/s/server: "[^"]+"/server: "'"${CF_IP_3}"'"/' wmsxwd.yaml

      - name: Update GitHub Gist via API
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          CONTENT=$(python3 -c 'import json; print(json.dumps(open("wmsxwd.yaml").read()))')
          JSON_DATA="{\"files\": {\"wmsxwd.yaml\": {\"content\": $CONTENT}}}"
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/$GIST_ID \
            -d "$JSON_DATA"

      - name: Commit & Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wmsxwd.yaml
          git diff-index --quiet HEAD || git commit -m "chore: auto update cloudflare ips"
          git push
